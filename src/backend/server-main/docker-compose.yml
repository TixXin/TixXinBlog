# 本地开发依赖栈（不含 app 本身），见 docs/backend/development.md §7.1
# 用法：docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: tixxin-blog-postgres
    environment:
      POSTGRES_USER: tixxin
      POSTGRES_PASSWORD: tixxin
      POSTGRES_DB: tixxin_blog
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tixxin -d tixxin_blog']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tixxin-blog-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.9
    container_name: tixxin-blog-meilisearch
    environment:
      MEILI_MASTER_KEY: dev-master-key-change-me
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - '7700:7700'
    volumes:
      - meilidata:/meili_data

  minio:
    image: minio/minio:latest
    container_name: tixxin-blog-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: tixxin
      MINIO_ROOT_PASSWORD: tixxin-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  meilidata:
  miniodata:
