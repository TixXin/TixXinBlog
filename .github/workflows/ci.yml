name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'src/backend/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'src/backend/**'
      - 'docs/**'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # Node 22:ESLint 10 依赖 Object.groupBy(Node 21.4+),Node 20 会直接崩溃
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm --filter web-blog exec nuxt typecheck

      - name: Test
        run: pnpm --filter web-blog test

      - name: Build
        run: pnpm build

      - name: Audit Dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true
